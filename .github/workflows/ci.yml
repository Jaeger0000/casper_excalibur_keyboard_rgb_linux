name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-ubuntu:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libegl1 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 libxcb-shape0 libxcb-cursor0
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-qt flake8 mypy
    - name: Run Tests
      run: |
        xvfb-run make test

  test-archlinux:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
    - uses: actions/checkout@v4
    - name: Install system dependencies
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm python python-pip xorg-server-xvfb qt6-base gcc make
    - name: Create virtual environment
      run: |
        python -m venv .venv
    - name: Install Python dependencies
      run: |
        . .venv/bin/activate
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-qt flake8 mypy
    - name: Run Tests
      run: |
        . .venv/bin/activate
        xvfb-run make test

  release:
    needs: [test-ubuntu, test-archlinux]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install build tools
      run: python -m pip install build

    - name: Semantic Release
      id: semantic
      uses: python-semantic-release/python-semantic-release@v9
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish package distributions to GitHub Releases
      uses: python-semantic-release/upload-to-gh-release@main
      if: steps.semantic.outputs.released == 'true'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Update PKGBUILD
      if: steps.semantic.outputs.released == 'true'
      env:
        NEW_VERSION: ${{ steps.semantic.outputs.version }}
      run: |
        ./update_pkgbuild.sh $NEW_VERSION
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add PKGBUILD
        git commit -m "chore(pkgbuild): update to v$NEW_VERSION [skip ci]" || true
        git push origin HEAD:main || true

    - name: Setup SSH for AUR
      if: steps.semantic.outputs.released == 'true'
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

    - name: Prepare AUR Deployment
      if: steps.semantic.outputs.released == 'true'
      env:
        NEW_VERSION: ${{ steps.semantic.outputs.version }}
      run: |
        # Set git user
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        # Add AUR host key
        mkdir -p ~/.ssh
        ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

        # Release steps may leave tracked changes in the workspace.
        # Use the current checked-out files directly instead of rebasing here.

        # Clone AUR repo
        git clone ssh://aur@aur.archlinux.org/casper-keyboard-rgb.git aur_repo

        # Copy updated files to AUR repo
        cp PKGBUILD aur_repo/
        cp casper-keyboard-rgb.install aur_repo/

        # Generate SRCINFO in an Arch Linux container logic (since we are on Ubuntu)
        # However, to generate .SRCINFO correctly, we need makepkg which is Arch specific.
        # We will use an Arch Linux Docker container just for generating .SRCINFO
        docker run --rm -v $PWD/aur_repo:/pkg -w /pkg archlinux:latest bash -c "pacman -Sy --noconfirm sudo git base-devel && chown -R nobody:nobody /pkg && sudo -u nobody makepkg --printsrcinfo > .SRCINFO"

        # Change ownership back to runner user
        sudo chown -R $USER:$USER aur_repo

        # Commit and push to AUR
        cd aur_repo
        git add PKGBUILD casper-keyboard-rgb.install .SRCINFO

        # Check if there are changes
        if ! git diff-index --quiet HEAD; then
          git commit -m "Update to ${NEW_VERSION}"
          git push origin master
        else
          echo "No changes to commit to AUR"
        fi
