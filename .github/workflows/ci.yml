name: CI

on:
  push:
    branches: [ "master" ]

jobs:
  test-ubuntu:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libegl1 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 libxcb-shape0 libxcb-cursor0

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-qt flake8 mypy

    - name: Run Tests
      run: |
        xvfb-run make test

  test-archlinux:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm python python-pip xorg-server-xvfb qt6-base gcc make

    - name: Ensure correct Python environment
      run: |
        rm -rf /usr/lib/python3.13/EXTERNALLY-MANAGED || rm -rf /usr/lib/python*/EXTERNALLY-MANAGED || true

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-qt flake8 mypy

    - name: Run Tests
      run: |
        xvfb-run make test
